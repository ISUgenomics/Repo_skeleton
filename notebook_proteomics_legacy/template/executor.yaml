version: 1

inputs:
  required_locations:
    - workflow/00_raw_data/
  expected_user_supplied_items:
    - raw_data_file
    - metadata_source_file_optional
    - project_request_context_optional

modes:
  prepare:
    phases:
      - discover
      - bootstrap
      - prepare
  run:
    phases:
      - discover
      - bootstrap
      - prepare
      - execute
      - validate_outputs
  docs:
    phases:
      - discover
      - extract
      - document
      - validate_docs
  validate:
    phases:
      - discover
      - validate_outputs
  research:
    phases:
      - discover
      - research_ready
      - research
      - validate_docs
  full:
    phases:
      - discover
      - bootstrap
      - prepare
      - execute
      - validate_outputs
      - extract
      - document
      - validate_docs

phases:
  discover:
    description: Confirm contract files and input locations.
    actions:
      - read: template/workflow.yaml
      - read: template/variables.yaml
      - read: template/variable_sources.yaml
      - read: template/docs_map.yaml
      - read: template/validation.yaml
      - verify_exists: workflow/00_raw_data/
      - note: create and maintain workflow/execution_log.md as a generated ordered run log from the first material action onward

  bootstrap:
    description: Create the declared local workflow environment before setup or execution.
    actions:
      - note: record any environment or bootstrap commands actually run in workflow/execution_log.md
      - bootstrap_environment:
          system_prerequisites:
            - python3-pip
            - python3.12-venv

  prepare:
    description: Create and review startup files declared by this template.
    actions:
      - note: record setup helpers run, files regenerated, and any manual review decisions in workflow/execution_log.md
      - run_helper:
          script: workflow/scripts/python/config_gen.py
          args:
            - --project-root
            - .
            - --force
      - review_file: workflow/00_raw_data/config/project_manifest.yaml
      - run_helper:
          script: workflow/scripts/python/metadata_gen.py
          args:
            - --manifest
            - workflow/00_raw_data/config/project_manifest.yaml
            - --force
      - review_file: workflow/00_raw_data/config/sample_metadata.csv
      - review_file: workflow/00_raw_data/config/comparisons.csv
      - run_helper_optional:
          script: workflow/scripts/python/infer_astral_mode.py

  execute:
    description: Run the primary workflow entrypoint declared by the template.
    actions:
      - note: record the main execution entrypoint, retries, and any commands run outside the notebook in workflow/execution_log.md
      - execute_notebook:
          path: workflow/scripts/notebooks/proteomics_analysis.ipynb
          timeout_seconds: -1

  extract:
    description: Generate structured documentation helpers from workflow outputs.
    actions:
      - note: record which helper scripts were run in workflow/execution_log.md
      - run_helper_optional:
          script: workflow/scripts/python/docs/extract_metadata_summary.py
      - run_helper_optional:
          script: workflow/scripts/python/docs/extract_project_context.py
      - run_helper_optional:
          script: workflow/scripts/python/docs/extract_statistics_summary.py
      - run_helper_optional:
          script: workflow/scripts/python/docs/extract_visualization_inventory.py
      - run_helper_optional:
          script: workflow/scripts/python/docs/extract_significant_hits.py
      - run_helper_optional:
          script: workflow/scripts/python/docs/extract_run_summary.py
      - run_helper_optional:
          script: workflow/scripts/python/docs/extract_results_report_fields.py
      - run_helper_optional:
          script: workflow/scripts/python/docs/extract_execution_report_fields.py

  document:
    description: Populate docs from resolved variables and generated outputs.
    actions:
      - note: record material post-run documentation edits or non-default decisions in workflow/execution_log.md
      - restore_contract_docs:
          overwrite_existing: true
          sections:
            - root
            - workflow
      - validate_tokens: template_variables.py
      - apply_tokens: template_variables.py
      - run_helper_optional:
          script: workflow/scripts/python/docs/apply_checklists.py

  validate_outputs:
    description: Confirm required workflow outputs exist and pass basic sanity checks.
    actions:
      - note: record output-validation failures or accepted output exceptions in workflow/execution_log.md
      - validate_outputs: template/validation.yaml

  validate_docs:
    description: Confirm documentation state and unresolved values after doc generation.
    actions:
      - note: record documentation-validation failures or accepted unresolved items in workflow/execution_log.md
      - validate_docs: template/validation.yaml

  research_ready:
    description: Confirm that workflow execution and documentation are complete enough for literature augmentation.
    actions:
      - note: record the transition into research mode in workflow/execution_log.md
      - read: template/research.yaml
      - verify_exists: workflow/final_report/README.md
      - verify_exists: workflow/scripts/python/docs/project_context.json
      - verify_exists: workflow/scripts/python/docs/results_report_fields.json
      - verify_exists: workflow/scripts/python/docs/run_summary.json

  research:
    description: Perform project-specific literature augmentation using the declared research plan.
    actions:
      - note: record literature-search steps that materially changed project docs in workflow/execution_log.md
      - perform_research:
          path: template/research.yaml
      - apply_research_updates:
          path: template/research.yaml
      - run_helper:
          script: workflow/scripts/python/docs/refine_results_observations.py
      - run_helper:
          script: workflow/scripts/python/docs/refine_introduction_narrative.py
