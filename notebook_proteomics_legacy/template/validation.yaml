required_files:
  - README.md
  - 00_Background.md
  - 01_Files.md
  - 02_Metadata.md
  - 03_Methods.md
  - 04_Results.md
  - 05_Introduction.md
  - 06_Discussion.md
  - 08_References.md
  - workflow/00_raw_data/config/project_manifest.yaml
  - workflow/00_raw_data/config/sample_metadata.csv
  - workflow/00_raw_data/config/comparisons.csv

required_variables:
  - project_title
  - one_sentence_summary
  - organism_or_system
  - tissue_or_material
  - sample_count
  - main_biological_question
  - raw_data_file
  - psm_threshold
  - abundance_column_pattern
  - primary_normalization
  - astral_mode

required_outputs_after_run:
  - workflow/execution_log.md
  - workflow/01_qc_normalization/normalized_abundance_matrix.csv
  - workflow/02_statistics/significant_protein_counts.csv
  - workflow/03_visualization/output
  - workflow/final_report/README.md

optional_docs_with_unresolved_tokens:
  - 06_Discussion.md
  - 08_References.md
  - 09_AuthorInfo.md

optional_unresolved_tokens:
  - principal_investigator
  - analysis_lead
  - project_contact
  - example_volcano
  - example_heatmap
  - example_pca
  - example_plsda
  - key_correspondence_date
  - hypothesis_hit_1_protein
  - hypothesis_hit_1_relevance
  - hypothesis_hit_1_evidence
  - hypothesis_hit_2_protein
  - hypothesis_hit_2_relevance
  - hypothesis_hit_2_evidence

unresolved_token_pattern: "\\{\\{\\s*[a-zA-Z0-9_]+\\s*\\}\\}"
