tissue_or_material:
  source: project_manifest
  file: workflow/00_raw_data/config/project_manifest.yaml
  path: project.material

sample_count:
  source: sample_metadata
  file: workflow/00_raw_data/config/sample_metadata.csv
  rule: count_rows_where_include_true

raw_data_file:
  source: project_manifest
  file: workflow/00_raw_data/config/project_manifest.yaml
  path: inputs.raw_data_file

metadata_source_file:
  source: project_manifest
  file: workflow/00_raw_data/config/project_manifest.yaml
  path: inputs.metadata_source

full_groups:
